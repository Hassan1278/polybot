name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  python-checks:
    name: Python checks
    runs-on: ubuntu-latest

    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: polymarket
          POSTGRES_PASSWORD: polymarket
          POSTGRES_DB: polymarket
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U polymarket"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+psycopg://polymarket:polymarket@localhost:5432/polymarket
      ALEMBIC_DATABASE_URL: postgresql+psycopg://polymarket:polymarket@localhost:5432/polymarket
      REDIS_URL: redis://localhost:6379/0
      PYTHONDONTWRITEBYTECODE: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff
        run: ruff check .

      - name: Mypy (optional)
        continue-on-error: true
        run: mypy packages services

      - name: Alembic upgrade head
        run: alembic upgrade head

      - name: Pytest
        run: pytest -q

  dashboard-checks:
    name: Dashboard checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: dashboard

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build

      - name: Lint (optional)
        continue-on-error: true
        run: npm run lint
