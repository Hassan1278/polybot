name: polybot

x-python-base: &python-base
  build:
    context: .
    dockerfile: services/_base/Dockerfile
  env_file: .env
  depends_on:
    postgres: { condition: service_healthy }
    redis:    { condition: service_healthy }
  restart: unless-stopped
  volumes:
    - ./services:/app/services
    - ./packages:/app/packages
    - ./scripts:/app/scripts
    - ./config:/app/config
    - ./data:/app/data
    - ./alembic.ini:/app/alembic.ini:ro

services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: polybot-postgres
    env_file: .env
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      # Two-stage: socket up AND simple query executable. Plain pg_isready
      # passes the moment Postgres binds the port, before any DB is ready
      # for queries — that lets dependents start too early.
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} && psql -U ${POSTGRES_USER} -d ${POSTGRES_DB} -tAc 'SELECT 1' >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: polybot-redis
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      # ping + a write that auto-expires — proves both read and write paths
      # work, not just the socket.
      test: ["CMD-SHELL", "redis-cli ping >/dev/null && redis-cli set _hc 1 EX 5 >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  api:
    <<: *python-base
    container_name: polybot-api
    # Run migrations on every start (idempotent — alembic only applies
    # pending revisions) so a fresh `docker compose up` brings up a
    # working DB schema without a manual `alembic upgrade head` step.
    # Other Python services depend on `api: service_healthy` (the
    # dashboard already does — extend the same dep to ingest/signals/
    # executor if you see them race-querying empty tables at boot).
    command: sh -c "alembic -c alembic.ini upgrade head && uvicorn services.api.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    healthcheck:
      # /health/deep verifies DB + Redis reachability via the real session
      # pool, not just process-alive. Returns 503 if either is broken so
      # docker can flag the container `unhealthy`.
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health/deep >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  ingest:
    <<: *python-base
    container_name: polybot-ingest
    command: python -m services.ingest.main
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  signals:
    <<: *python-base
    container_name: polybot-signals
    command: python -m services.signals.main
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  executor:
    <<: *python-base
    container_name: polybot-executor
    command: python -m services.executor.main
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: polybot-dashboard
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: ${DASHBOARD_API_URL}
    ports:
      - "3000:3000"
    depends_on:
      # Gate SSR start on api healthiness — short-form `- api` only waits for
      # the container to *start*, so dashboard SSR could 502 immediately on
      # boot before the api finished its first /health/deep check.
      api:
        condition: service_healthy
    restart: unless-stopped

  # Order-signing sidecar for live CLOB V2 trading (deposit-wallet / POLY_1271).
  # Only the live executor talks to it; paper mode never touches it. See
  # docs/V2_LIVE_MIGRATION.md. Phase 1 = health endpoint only.
  clob-rs:
    build:
      context: ./services/clob-rs
    container_name: polybot-clob-rs
    env_file: .env
    environment:
      SIGNER_KEY:             ${POLYMARKET_PRIVATE_KEY:-}
      FUNDER_ADDRESS:         ${POLYMARKET_FUNDER_ADDRESS:-}
      SIGNATURE_TYPE:         ${POLYMARKET_SIGNATURE_TYPE:-3}
      POLYMARKET_CLOB_V2_URL: ${POLYMARKET_CLOB_V2_URL:-https://clob-v2.polymarket.com}
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8082/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
