# Risk-manager rules. The executor enforces these before EVERY order.
# Hot-reloaded every 30 s via packages/polybot/yaml_config.py.
#
# Layout:
#   defaults:  shared across both modes (paper and live)
#   modes.paper / modes.live:  per-mode overrides, deep-merged on top of defaults.
#
# Live-mode is intentionally TIGHTER than paper (smaller positions, tighter
# drawdown, fewer concurrent slots) — paper-mode pushes for high concurrency
# to exercise the pipeline; live mode protects real USDC.
#
# Dashboard mutations via /admin/risk write into Redis overrides (see
# packages/polybot/runtime_config.py), keyed per mode. This file remains
# the canonical baseline that `redis-cli FLUSHDB` reverts to.
#
# ---------------------------------------------------------------------------
# TUNING GUIDE
# ---------------------------------------------------------------------------
# few-signals-fire-more:
#   - Raise execution.max_orders_per_minute (paper has it effectively-unlimited).
#   - Loosen execution.reject_if_spread_pct_above (5.0 -> 8.0).
#   - Lower execution.reject_if_top_wallet_count_below (3 -> 1).
#   - Raise position.max_open_positions so the bot keeps firing.
#
# too-many-signals-fire-fewer:
#   - Lower execution.max_orders_per_minute.
#   - Tighten execution.reject_if_spread_pct_above.
#   - Raise execution.cooldown_seconds_per_market.
#
# risk-management-tighter (always start here for live):
#   - Shrink position.max_position_usdc + max_per_market_usdc.
#   - Lower drawdown.max_daily_loss_usdc; keep on_breach: kill.
#   - In sizing: drop base_usdc + max_usdc, push anchor (0.5 -> 0.65),
#     steepness (2.5 -> 4.0) so only high-score signals get real size.
# ---------------------------------------------------------------------------

defaults:
  global:
    trading_hours_utc: "00:00-23:59"          # always-on by default
    kill_on_db_lag_seconds: 60
    kill_on_ws_disconnect_seconds: 120

  position:
    max_position_usdc: 25
    max_open_positions: 50
    # Cumulative cap PER BET (one market): total notional across ALL orders,
    # counting resting/unfilled limit orders — NOT a per-order cap. The bot was
    # stacking small limit orders past the old ceiling (which only summed paper
    # Positions and so read ~0 in live), letting one market reach ~$90. Hard 50
    # USDC ceiling on total exposure to a single bet.
    max_per_market_usdc: 50
    # Long-shot guard: any bet whose entry price is below low_odds_price_threshold
    # may hold at most low_odds_max_per_bet_usdc cumulatively. Once a sub-threshold
    # bet reaches that cap, every further order on it is refused (the odds are too
    # bad to keep adding). At/above the threshold, the full max_per_market_usdc
    # applies. Price is the entry probability (0-1), e.g. 0.20 = 20c.
    low_odds_price_threshold: 0.20
    low_odds_max_per_bet_usdc: 5
    # Hard entry-price FLOOR: refuse any NEW entry priced below this (operator).
    # Sub-floor longshots have brutal payoff geometry and dominate the fat-tail
    # losses. Price is the entry probability (0-1), so 0.07 = 7c. 0/null disables.
    min_entry_price: 0.07
    max_per_category_usdc: 400
    # Treat all correlated crypto MAJORS as ONE bet per direction and cap the
    # GROSS same-direction notional across every crypto market. The per-market /
    # per-asset / per-category caps don't bound aggregate directional exposure to
    # the correlated complex — this does. Stops the book concentrating into a
    # single "crypto up/down" thesis (e.g. the ~$200 of BTC-down + BTC-below-X +
    # ETH-down that halved the account when BTC ran up). Tune to ~15-20% of
    # equity. null disables.
    max_crypto_factor_usdc: 100
    size_sigmoid_anchor: 0.6
    # Hold at most ONE outcome per market — block the bot from buying both
    # sides of the same event (a self-hedge that locks in a post-fee loss).
    # Set false to allow opposing-outcome positions.
    one_direction_per_market: true
    # Hold at most ONE price direction per underlying CRYPTO asset across
    # markets. Blocks contradictory bets like an open "BTC up daily" while a
    # new order is "BTC below $X" — keeps the book uniformly one-sided per
    # asset. Only OPEN markets constrain new orders, so daily BTC up/down still
    # trades day-to-day; only simultaneous both-sided exposure is refused.
    # Direction inference is precision-biased (fails open when ambiguous).
    # Set false to disable.
    one_direction_per_asset: true
    # Keep correlated crypto MAJORS (BTC/ETH/SOL + top L1s) one-directional within
    # the SAME UTC resolution day. Blocks self-cancelling theses like an open
    # "BTC down today" + a new "ETH up today" (majors move together, so one of the
    # mirrored signals is almost certainly noise). Memecoins (DOGE/SHIB/PEPE) are
    # exempt; different resolution days are separate books, so day-to-day
    # directional bets keep trading. Precision-biased (fails open on ambiguous
    # direction/asset). Set false to disable.
    one_direction_per_crypto_timeframe: true
    # Hold at most ONE price-BUCKET position per crypto asset per UTC resolution
    # day. Daily settlements list several "between $A-$B" buckets ("62-64k",
    # "64-66k", ...) AND thresholds ("above $X"); mirroring smart money the bot would
    # otherwise stack contradictory legs — e.g. an open "above 62k NO" while a new
    # order is "between 60-62k NO" for the same day (a self-hedge that bleeds fees).
    # Reduces each leg to its win-region (price intervals where it pays out) and blocks
    # a new order whose region CROSSES an open one; covers threshold-vs-range,
    # range-vs-range and threshold-vs-threshold. The directional guards don't fire
    # (separate axes) and the markets often share no populated event_id so the
    # per-event guard misses them. Keyed on (asset, day, win-region) from the question
    # — event_id-independent. Precision-biased: fails open on non-crypto, unparseable
    # asset/price, or missing resolution date. Set false to disable.
    one_position_per_crypto_bucket: true
    # Hold at most ONE market per Polymarket EVENT. Sibling markets of one
    # event (all candidates in a primary, both sides of a match, ...) can be
    # mutually exclusive, so taking several is an implicit two-sided bet — e.g.
    # NO on two frontrunners in the same NY-12 primary. The first market entered
    # in an event wins; its still-open siblings are blocked. Markets with no
    # parent event are unaffected. Set false to disable.
    one_position_per_event: true
    # Hold at most ONE open bet per POLITICS candidate. The bot otherwise stacks
    # several (often contradictory) bets on the same person across different
    # markets/events — e.g. backing "X win by 5-10%" while it keeps placing "X not
    # president" orders. Keyed on the candidate NAME parsed from the question, so it
    # links markets that share no event_id. Trump is excluded (his name spans too
    # many unrelated markets). Precision-biased: fails open on unparseable names or
    # non-politics markets. Set false to disable.
    one_position_per_politics_candidate: true

  drawdown:
    max_daily_loss_usdc: 50
    max_weekly_loss_usdc: 150
    daily_reset_utc_hour: 0
    on_breach: kill                           # kill | pause_24h
    # Live equity-drawdown circuit breaker (the REAL brake). The realised-PnL
    # checks above are inert in live — the live path writes only Fill rows and
    # never reconciles realised PnL — so a separate loop (services/executor/
    # equity_guard.py) reads TRUE venue equity (cash + marked positions) each
    # minute, snapshots day-start equity, and trips the kill switch when intraday
    # drawdown exceeds this fraction. Reuses the /live/account data sources.
    # Fail-safe: never trips on a failed read. 0/null off.
    # DISABLED per operator: the daily % breaker is OFF (was 0.15) so the algo is
    # NOT halted by an intraday swing. The absolute floor below is the only stop.
    max_daily_drawdown_pct: 0
    # Auto-resume the breaker's OWN (% drawdown) halt once intraday drawdown
    # recovers to <= this fraction of the day's open. Moot while the % breaker is
    # disabled; only equity_guard's own equity_drawdown kills ever auto-clear.
    resume_drawdown_pct: 0.10
    # Absolute equity floor (USDC): a HARD stop, manual-clear, independent of the
    # % breaker above. Trips the kill switch when TRUE venue equity (cash + marked
    # positions) falls below this. 0/null off. Operator-set to a $180 floor.
    min_equity_usdc: 180

  execution:
    cooldown_seconds_per_market: 300
    max_orders_per_minute: 20
    reject_if_spread_pct_above: 5.0
    reject_if_top_wallet_count_below: 3

  # size = base_usdc + (max_usdc - base_usdc) * sigmoid(steepness * (score - anchor))
  sizing:
    base_usdc: 10
    max_usdc: 50
    anchor: 0.5
    steepness: 2.5

  # Exit-mirror (Stage 3): follow smart money OUT. When the entry cluster for a
  # position we hold dissolves (quality-weighted support drops below the
  # threshold), STOP ADDING to that thesis and CLOSE the position. Detection runs
  # in paper by default; LIVE selling stays OFF (live_enabled) until validated.
  exit_mirror:
    enabled: true                  # run detection (paper closes shadow-run)
    live_enabled: false            # LIVE cluster-exit OFF (operator): the ONLY live
                                   # exit is now the stop-loss in exit_rules. No early exits.
    support_dissolution_threshold: 0.5         # exit when < this fraction of the cluster (quality-weighted) is still long
    fallback_support_dissolution_threshold: 0.35   # stricter when the cluster is only INFERRED (no entry Signal)
    live_exit_on_fallback: false   # never auto-sell live off an inferred cluster
    cooldown_seconds: 300          # one close per (mode, market, outcome) per window
    backstop_sweep_seconds: 120    # periodic re-check (pub/sub is lossy)
    passive: false                 # exits cross the book (taker) so they fill; true = maker
    allow_close_when_killed: true  # a close may bypass the kill switch (closing de-risks)
    quality_window: "30d"          # WalletStats window for cluster quality weights

  # Stop-loss exit engine (services/executor/exit_rules.py).
  # DISABLED per operator: the stop-loss is OFF. Combined with exit_mirror live
  # off, the live bot does NO selling at all — every position RIDES TO RESOLUTION
  # (no stop-loss, no take-profit, no early exits of any kind). The only live exit
  # is on-chain settlement. Downside is therefore UNCAPPED: losers ride to $0.
  # The stop-loss ladder below is retained, dormant — flip enabled:true (and
  # live_enabled:true) to restore it without a code change.
  exit_rules:
    enabled: false                    # OFF — no stop-loss sweep; positions ride to resolution
    live_enabled: false               # (moot while disabled) the stop-loss would close LIVE
    stop_loss_level: 0.20             # close if the mark falls to/below 0.20...
    low_entry_threshold: 0.20         # ...unless the leg was ENTERED below 0.20,
    low_entry_stop: 0.05              #    in which case the stop is 0.05 (longshot room)
    profit_lock_trigger: 0.75         # once the mark EVER exceeds 0.75 (any entry)...
    profit_lock_stop: 0.43            # ...the stop ratchets up to exactly 0.43
    hwm_ttl_seconds: 1209600          # 14d: how long the "ever hit 0.75" flag persists in Redis
    min_close_notional_usdc: 2.0      # ignore dust legs (closing them just bleeds fees)
    cooldown_seconds: 300             # one close per (mode, market, outcome) per window
    sweep_seconds: 60                 # stop-loss re-check cadence

  live_only:
    require_kill_switch_check: true
    require_admin_token_for_size_above_usdc: 100
    enforce_allowance_check: true             # USDC.e approval to CTF must exist

modes:
  paper:
    # Paper mode: maximize coverage to exercise pipeline + collect signal data.
    # Real-money safety isn't a concern, so caps go wide.
    position:
      max_open_positions: 200
      max_per_category_usdc: 1000
    execution:
      max_orders_per_minute: 10000            # CLOB hard-caps anyway

  live:
    # Live mode: TIGHT caps. Real USDC. Default cap halves what paper allows.
    position:
      max_position_usdc: 25                   # same as default; ceiling stays small
      max_open_positions: 30                  # well below paper's 200
      max_per_category_usdc: 250              # max ~$5k exposure per category
      # CRYPTO DISABLED ON LIVE (operator): block all NEW live crypto entries.
      # Existing crypto positions are untouched and still get sold/stopped out
      # (the close path skips preflight). Paper is unaffected. Remove "crypto"
      # to re-enable. Case-insensitive.
      disabled_categories: [crypto]
      max_crypto_factor_usdc: 25              # ALL crypto = one directional bet.
                                              # CUT 60 -> 25 (operator) during a
                                              # crypto down-move: the book was
                                              # concentrated long "BTC/ETH above
                                              # $X" and bled as crypto fell. ~11%
                                              # of ~$226 equity. Caps NEW same-
                                              # direction crypto notional (no
                                              # forced selling); blocks stacking
                                              # more into the bet until exposure
                                              # unwinds. Non-crypto unaffected.
    drawdown:
      max_daily_loss_usdc: 100                # kill at -1% of $10k equity
    execution:
      max_orders_per_minute: 20               # respectful of CLOB
      reject_if_spread_pct_above: 3.0         # tighter slippage tolerance
    sizing:
      base_usdc: 5                            # smaller baseline bets
      max_usdc: 25                            # ceiling = position cap
      anchor: 0.65                            # only high-score signals get size
      steepness: 4.0
    exit_mirror:
      live_enabled: false                     # LIVE cluster-exit OFF (operator) — stop-loss is the only exit
